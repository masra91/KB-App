# KB-App CI — the authoritative test gate (SPEC-0012 TEST-10/TEST-11).
#
# COVERAGE — read this before assuming "green == fully verified" (TEST-11, no silent caps):
#   NOW (phased rollout), two GATING jobs on every PR + push to `main` (Linux):
#     - `quick`   — typecheck + lint + unit tests + coverage.
#     - `package` — `npm run package` build-check: proves the app still PACKAGES (Vite main
#                   bundle + asar pack + native-dep prepare). Catches the class of break that
#                   sails past typecheck/lint/unit because it only manifests in the packaged
#                   artifact — e.g. a dep not bundled into the main bundle (the `simple-git`
#                   asar bug). Cheap: build-only, no Playwright, no app launch. Linux is enough
#                   — Vite-build + asar-pack is platform-agnostic, so a bundling regression
#                   fails here regardless of the shipped OS.
#   COST-MOVED OFF THE PER-PR PATH (CI-COST-REDUCTION; see the `package`/`package-macos` jobs):
#        the macOS `package` build-check used to run on every PR at the 10× macOS minute
#        multiplier (the recurring Actions spend). It is now the separate `package-macos` job,
#        which runs on push-to-`main` (post-merge / pre-release backstop), on the `macos` PR
#        label, and on dispatch — NOT on routine PRs. The macOS-only native-dep regression class
#        (#247 `fsevents`, `os: ["darwin"]`) is therefore caught on merge-to-main rather than on
#        the PR; see the job comments for the full tradeoff.
#   GOAL: a full matrix — every level (unit + component + e2e + packaged smoke) on BOTH
#        macOS and Windows (the shipped targets, STACK-3). We grow toward it incrementally.
#   The `e2e` job below is the start of that rollout: it is OPT-IN (manual dispatch or an
#        `e2e` PR label) and NOT yet a required gate, because the Playwright/packaged-app
#        harness is new and unverified across runners. It now runs three smokes — boot-survival
#        (TEST-4), Ask UI (stubbed recall), and the BUG #65 recall-wiring regression guard
#        (recall.e2e.ts, TEST-21: real recall resolves + spawns the BYOA copilot, NOT the asar
#        bundled lookup). Promote it to required once stable.
#   NOT yet covered by a GATE (no silent caps, TEST-11): the `package` job builds but does not
#        RUN the app, and the runtime smokes above gate nothing until the `e2e` job is promoted
#        to required (the phased TEST-11 step). A full live-LLM grounded recall is deliberately
#        never gating — it needs a real copilot + API key (flaky/costly); it stays opt-in/manual.
#
# Local vs CI: the local quick suite (/validate) is typecheck + lint + unit and excludes
# e2e (TEST-9). e2e lives here in CI only.

name: CI

# ── Why a PR can show ZERO checks (and how to clear it) — documented per a root-cause investigation
#    (PRs #271 / #284 / #290 each OPENED with no checks until a rebase made them appear; the affected
#    branches have a workflow run ONLY on their rebased SHA, none on the original head):
#    A `pull_request` workflow runs against the ephemeral MERGE ref (the PR head merged into the base).
#    When a PR is CONFLICTING / unmergeable (`mergeStateStatus: DIRTY` — its base `main` advanced and the
#    branch now conflicts), GitHub cannot create that merge ref, so it schedules NOTHING: the PR shows
#    zero checks — an ABSENCE, not a red. This is GitHub-side behavior, not a workflow misconfig. A merely
#    STALE-but-clean base is fine (it still triggers on `opened`, e.g. #285); ONLY a real conflict
#    suppresses checks.
#    FIX = rebase the branch onto latest `main` (resolve the conflict). The PR becomes mergeable AND the
#    rebase push fires `synchronize` → CI runs. A conflicting PR must be rebased to merge regardless, so
#    this isn't CI-induced busywork. We deliberately do NOT add an all-branch `push:` trigger to mask it:
#    that would run full CI on every push to every WIP/standby branch (cost), and a raw-head run that
#    omits main's changes is a misleading signal for a PR that can't merge until it's rebased anyway.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` so adding the `e2e` label re-triggers the workflow and runs the opt-in e2e job.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate + commit the e2e visual-snapshot baselines (linux) — runs ONLY the snapshots job'
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    working-directory: app

jobs:
  quick:
    name: typecheck · lint · unit
    strategy:
      fail-fast: false
      matrix:
        # Phased (TEST-11): Linux-only for now. Goal: add macos-latest, windows-latest.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Typecheck (TEST-7)
        run: npm run typecheck
      - name: Lint — zero warnings (TEST-6/TEST-8)
        run: npm run lint -- --max-warnings 0
      - name: Unit tests + coverage (TEST-2/TEST-12)
        run: npm run test:coverage

  # Secret scan (security-sweep Phase-2a): block any NEWLY committed credential so the public repo
  # stays clean (the Phase-1 sweep found ZERO real secrets — this keeps it that way). gitleaks scans
  # the working tree with the repo-root `.gitleaks.toml`, which inherits the full default rule set and
  # allowlists ONLY the cassette secret-scrubber's intentional fake-token fixtures (EVAL-6). Sub-second,
  # ubuntu, 1× cost — cheap enough to gate every PR. Full-history exposure is handled by the one-time
  # sweep + the coordinated history purge, not re-scanned here. NB: not yet pinned as a REQUIRED check
  # in the `main` ruleset — it runs + reports on every PR; promote it to required at the repo level.
  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        working-directory: ${{ github.workspace }}
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan the working tree for committed secrets (no new credentials)
        working-directory: ${{ github.workspace }}
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner

  # Gating build-check (TEST-20): prove the app still PACKAGES. Build-only — no Playwright,
  # no app launch — so it's cheap enough to gate every PR, yet catches packaged-artifact
  # breaks (un-bundled deps / asar resolution) that the `quick` job structurally cannot see.
  #
  # ── COST / COVERAGE TRADEOFF (CI-COST-REDUCTION; TEST-11 "no silent caps") ───────────────────
  # macOS cloud runners bill at 10× the Linux per-minute rate. Running the macOS package
  # build-check on EVERY PR + every `synchronize` push was the dominant recurring Actions spend
  # (it ran `npm ci` + electron-forge `npm run package` at the 10× multiplier on each PR run).
  # So the package check is now SPLIT into two jobs:
  #   - `package`        (this job, ubuntu) — the per-PR REQUIRED gate. Catches every
  #                      platform-agnostic bundling regression (Vite main bundle + asar pack) —
  #                      e.g. the `simple-git` asar class. 1× cost.
  #   - `package-macos`  (below, macOS)     — NO LONGER runs on routine PRs. Runs on push-to-main
  #                      (post-merge, pre-release backstop), on PRs that opt in via the `macos`
  #                      label, and on manual dispatch.
  # WHAT IS NO LONGER GATED PER-PR: a macOS-ONLY native-dep regression — an `os: ["darwin"]` dep
  # such as chokidar's `fsevents` (#247, SPEC-0037). These are never installed/bundled on Linux,
  # so the ubuntu leg structurally CANNOT see them. WHERE IT IS STILL CAUGHT: `package-macos`
  # runs on every push to `main`, so such a regression is caught post-merge BEFORE any release
  # build ships; and a PR that knowingly touches native deps can add the `macos` label to verify
  # it pre-merge. This trades "caught on the PR" for "caught on merge to main (pre-release)" on
  # routine PRs, in exchange for removing the 10× macOS cost from the per-PR path.
  package:
    name: package build-check
    strategy:
      fail-fast: false
      matrix:
        # Single-entry matrix retained DELIBERATELY: it keeps this job's check-context name
        # `package build-check (ubuntu-latest)` identical to before the macOS split, so IF a branch
        # ruleset/protection ever pins it as a required check the name stays stable. (As of this
        # change the `main` ruleset requires only `typecheck · lint · unit (ubuntu-latest)` — neither
        # package context is required — so dropping the macOS leg from PRs blocks no required check.)
        # Mirrors the `quick` job's shape.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Package the app — build-only (TEST-20)
        run: npm run package
      - name: Assert the packaged artifact was produced (TEST-20)
        shell: bash
        run: |
          # electron-forge exits non-zero on a hard failure, but assert the artifact exists too
          # so a silently-empty package can never read as green. Per-OS output layout.
          if [ "$RUNNER_OS" = "macOS" ]; then
            app=$(ls -d out/KB-App-darwin-*/KB-App.app 2>/dev/null | head -n1)
            if [ -z "$app" ] || [ ! -x "$app/Contents/MacOS/KB-App" ]; then
              echo "::error::npm run package produced no launchable macOS .app under out/ (fsevents/native-bundling regression?)"
              ls -R out || true
              exit 1
            fi
            echo "Packaged artifact OK: $app"
          else
            dir=$(ls -d out/KB-App-linux-* 2>/dev/null | head -n1)
            if [ -z "$dir" ] || [ ! -x "$dir/KB-App" ]; then
              echo "::error::npm run package produced no runnable Linux artifact under out/"
              ls -R out || true
              exit 1
            fi
            echo "Packaged artifact OK: $dir/KB-App"
          fi

  # macOS package build-check — the durable catch for the macOS-only NATIVE-dep regression class
  # (#247 `fsevents`: `os: ["darwin"]` deps never install/bundle on Linux, so the ubuntu `package`
  # job above CANNOT see them). Moved OFF the per-PR path because the macOS runner bills at the 10×
  # minute multiplier and was the recurring Actions spend on every PR. It now runs on:
  #   - push to `main`      — post-merge / pre-release backstop (every merge is checked before any
  #                           release build, so a native-dep break can never reach a shipped artifact)
  #   - the `macos` PR label — opt-in PRE-merge verification for PRs that touch native deps
  #                           (mirrors the existing `e2e`-label opt-in pattern below)
  #   - workflow_dispatch   — manual, on demand (excludes the update_snapshots dispatch, which is
  #                           the snapshots job's exclusive trigger — same guard as the e2e job)
  # Default `npm run package` is UNSIGNED (KB_OSX_SIGN unset), so this leg needs no signing cert.
  package-macos:
    name: package build-check (macOS — native-dep catch)
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots != 'true') || contains(github.event.pull_request.labels.*.name, 'macos') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Package the app — build-only (TEST-20)
        run: npm run package
      - name: Assert the packaged artifact was produced (TEST-20)
        shell: bash
        run: |
          # electron-forge exits non-zero on a hard failure, but assert the artifact exists too
          # so a silently-empty package can never read as green. Per-OS output layout.
          if [ "$RUNNER_OS" = "macOS" ]; then
            app=$(ls -d out/KB-App-darwin-*/KB-App.app 2>/dev/null | head -n1)
            if [ -z "$app" ] || [ ! -x "$app/Contents/MacOS/KB-App" ]; then
              echo "::error::npm run package produced no launchable macOS .app under out/ (fsevents/native-bundling regression?)"
              ls -R out || true
              exit 1
            fi
            echo "Packaged artifact OK: $app"
          else
            dir=$(ls -d out/KB-App-linux-* 2>/dev/null | head -n1)
            if [ -z "$dir" ] || [ ! -x "$dir/KB-App" ]; then
              echo "::error::npm run package produced no runnable Linux artifact under out/"
              ls -R out || true
              exit 1
            fi
            echo "Packaged artifact OK: $dir/KB-App"
          fi

  e2e:
    name: e2e (packaged smoke) — phased / opt-in
    # OPT-IN until stable (TEST-11): manual dispatch, or add the `e2e` label to a PR. A
    # snapshot-update dispatch (update_snapshots=true) runs ONLY the `snapshots` job below, not this
    # one — the macOS/Windows runners can't produce the linux baseline and would just fail on the new
    # design-system snapshot for lack of a *-darwin/-win32 reference.
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots != 'true') || contains(github.event.pull_request.labels.*.name, 'e2e') }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Package the app (TEST-4)
        run: npm run package
      - name: Playwright e2e — packaged boot smoke (TEST-4)
        run: npm run test:e2e

  # Visual-snapshot baseline generator (SPEC-0033 §6 / DESIGN-9 HYBRID gate). The WS2 design-system
  # snapshot (e2e/designSystem.e2e.ts, #233) compares the packaged app's render against a *-linux.png
  # reference. Playwright names baselines per-platform, so the reference MUST be generated on the SAME
  # OS that runs the gating e2e — linux. This job is the one-time/maintenance path: dispatch with
  # `update_snapshots=true` on the branch, it regenerates the linux baseline(s) under xvfb and commits
  # them BACK to the branch, so the (future-gating) e2e run has a real reference to diff against. It is
  # dispatch-only + opt-in (never runs on a normal push/PR) and is the ONLY job that runs on a
  # snapshot-update dispatch (the e2e job is skipped — see its `if`).
  snapshots:
    name: e2e visual snapshots — regenerate linux baselines (dispatch-only)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated *-linux.png baselines back to the dispatched branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # the branch the dispatch targeted (so the push lands back on it)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # Electron (chromium-based) needs the same system libs Playwright installs for chromium, plus a
      # virtual display (xvfb) to launch the packaged app headlessly on linux.
      - name: Install Playwright system deps (Electron GUI libs)
        run: npx playwright install-deps chromium
      - name: Package the app (the snapshot boots the real artifact, TEST-4)
        run: npm run package
      - name: Regenerate the design-system visual baseline(s) — linux, under xvfb
        # Scoped to the showcase snapshot file (DESIGN-SHOWCASE): a full e2e run would also fire the
        # macOS/Windows-targeted smokes on linux (unverified there) and fail before we commit.
        # --update-snapshots writes (and passes on) the *-linux.png reference.
        run: xvfb-run -a npm run test:e2e -- e2e/showcase.e2e.ts --update-snapshots
      # NOTE: this commit is pushed with the default GITHUB_TOKEN, and GitHub does NOT run workflows for
      # commits pushed by GITHUB_TOKEN (recursion guard). So the regenerated baseline commit ends up as
      # the PR HEAD with NO required-check run → branch protection blocks the merge. To land it, the PR
      # needs ONE subsequent NON-bot commit (or an admin override) so HEAD gets a normal CI run. (Removing
      # [skip ci] alone is necessary but not sufficient — the no-trigger is the GITHUB_TOKEN, not the marker.)
      - name: Commit + push the regenerated *-linux.png baselines
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage ONLY new/changed linux snapshot PNGs — never anything else the run may have touched.
          mapfile -t pngs < <(git ls-files --others --modified --exclude-standard -- '*-linux.png')
          if [ ${#pngs[@]} -eq 0 ]; then
            echo "No *-linux.png baseline changes to commit (already current)."
            exit 0
          fi
          printf 'Committing baseline(s):\n%s\n' "${pngs[@]}"
          git add -- "${pngs[@]}"
          # No [skip ci]: the baseline commit SHOULD get the normal quick/package gates so the PR HEAD
          # carries its required check (else branch protection blocks the merge). It will NOT re-run the
          # snapshots job — that's `workflow_dispatch` + update_snapshots only (see its `if`), so a push
          # can never re-trigger it. No loop.
          git commit -m "ci(e2e): regenerate design-system visual baselines (linux)"
          git push origin "HEAD:${{ github.ref_name }}"
