# KB-App CI — the authoritative test gate (SPEC-0012 TEST-10/TEST-11).
#
# COVERAGE — read this before assuming "green == fully verified" (TEST-11, no silent caps):
#   NOW (phased rollout), two GATING jobs on every PR + push to `main` (Linux):
#     - `quick`   — typecheck + lint + unit tests + coverage.
#     - `package` — `npm run package` build-check: proves the app still PACKAGES (Vite main
#                   bundle + asar pack + native-dep prepare). Catches the class of break that
#                   sails past typecheck/lint/unit because it only manifests in the packaged
#                   artifact — e.g. a dep not bundled into the main bundle (the `simple-git`
#                   asar bug). Cheap: build-only, no Playwright, no app launch. Linux is enough
#                   — Vite-build + asar-pack is platform-agnostic, so a bundling regression
#                   fails here regardless of the shipped OS.
#   GOAL: a full matrix — every level (unit + component + e2e + packaged smoke) on BOTH
#        macOS and Windows (the shipped targets, STACK-3). We grow toward it incrementally.
#   The `e2e` job below is the start of that rollout: it is OPT-IN (manual dispatch or an
#        `e2e` PR label) and NOT yet a required gate, because the Playwright/packaged-app
#        harness is new and unverified across runners. It now runs three smokes — boot-survival
#        (TEST-4), Ask UI (stubbed recall), and the BUG #65 recall-wiring regression guard
#        (recall.e2e.ts, TEST-21: real recall resolves + spawns the BYOA copilot, NOT the asar
#        bundled lookup). Promote it to required once stable.
#   NOT yet covered by a GATE (no silent caps, TEST-11): the `package` job builds but does not
#        RUN the app, and the runtime smokes above gate nothing until the `e2e` job is promoted
#        to required (the phased TEST-11 step). A full live-LLM grounded recall is deliberately
#        never gating — it needs a real copilot + API key (flaky/costly); it stays opt-in/manual.
#
# Local vs CI: the local quick suite (/validate) is typecheck + lint + unit and excludes
# e2e (TEST-9). e2e lives here in CI only.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` so adding the `e2e` label re-triggers the workflow and runs the opt-in e2e job.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate + commit the e2e visual-snapshot baselines (linux) — runs ONLY the snapshots job'
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    working-directory: app

jobs:
  quick:
    name: typecheck · lint · unit
    strategy:
      fail-fast: false
      matrix:
        # Phased (TEST-11): Linux-only for now. Goal: add macos-latest, windows-latest.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Typecheck (TEST-7)
        run: npm run typecheck
      - name: Lint — zero warnings (TEST-6/TEST-8)
        run: npm run lint -- --max-warnings 0
      - name: Unit tests + coverage (TEST-2/TEST-12)
        run: npm run test:coverage

  # Gating build-check (TEST-20): prove the app still PACKAGES. Build-only — no Playwright,
  # no app launch — so it's cheap enough to gate every PR, yet catches packaged-artifact
  # breaks (un-bundled deps / asar resolution) that the `quick` job structurally cannot see.
  package:
    name: package build-check
    strategy:
      fail-fast: false
      matrix:
        # Linux-only: Vite-build + asar-pack is platform-agnostic, so a bundling regression
        # fails here regardless of the shipped OS. The mac/Windows package step stays in the
        # opt-in e2e job (where it also feeds the boot smoke).
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Package the app — build-only (TEST-20)
        run: npm run package
      - name: Assert the packaged artifact was produced (TEST-20)
        shell: bash
        run: |
          # electron-forge exits non-zero on a hard failure, but assert the artifact exists too
          # so a silently-empty package can never read as green.
          dir=$(ls -d out/KB-App-linux-* 2>/dev/null | head -n1)
          if [ -z "$dir" ] || [ ! -x "$dir/KB-App" ]; then
            echo "::error::npm run package produced no runnable Linux artifact under out/"
            ls -R out || true
            exit 1
          fi
          echo "Packaged artifact OK: $dir/KB-App"

  e2e:
    name: e2e (packaged smoke) — phased / opt-in
    # OPT-IN until stable (TEST-11): manual dispatch, or add the `e2e` label to a PR. A
    # snapshot-update dispatch (update_snapshots=true) runs ONLY the `snapshots` job below, not this
    # one — the macOS/Windows runners can't produce the linux baseline and would just fail on the new
    # design-system snapshot for lack of a *-darwin/-win32 reference.
    if: ${{ (github.event_name == 'workflow_dispatch' && !inputs.update_snapshots) || contains(github.event.pull_request.labels.*.name, 'e2e') }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Package the app (TEST-4)
        run: npm run package
      - name: Playwright e2e — packaged boot smoke (TEST-4)
        run: npm run test:e2e

  # Visual-snapshot baseline generator (SPEC-0033 §6 / DESIGN-9 HYBRID gate). The WS2 design-system
  # snapshot (e2e/designSystem.e2e.ts, #233) compares the packaged app's render against a *-linux.png
  # reference. Playwright names baselines per-platform, so the reference MUST be generated on the SAME
  # OS that runs the gating e2e — linux. This job is the one-time/maintenance path: dispatch with
  # `update_snapshots=true` on the branch, it regenerates the linux baseline(s) under xvfb and commits
  # them BACK to the branch, so the (future-gating) e2e run has a real reference to diff against. It is
  # dispatch-only + opt-in (never runs on a normal push/PR) and is the ONLY job that runs on a
  # snapshot-update dispatch (the e2e job is skipped — see its `if`).
  snapshots:
    name: e2e visual snapshots — regenerate linux baselines (dispatch-only)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated *-linux.png baselines back to the dispatched branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # the branch the dispatch targeted (so the push lands back on it)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # Electron (chromium-based) needs the same system libs Playwright installs for chromium, plus a
      # virtual display (xvfb) to launch the packaged app headlessly on linux.
      - name: Install Playwright system deps (Electron GUI libs)
        run: npx playwright install-deps chromium
      - name: Package the app (the snapshot boots the real artifact, TEST-4)
        run: npm run package
      - name: Regenerate the design-system visual baseline(s) — linux, under xvfb
        # Scoped to the design-system snapshot file: a full e2e run would also fire the macOS/Windows-
        # targeted smokes on linux (unverified there) and fail before we commit. --update-snapshots
        # writes (and passes on) the *-linux.png reference.
        run: xvfb-run -a npm run test:e2e -- e2e/designSystem.e2e.ts --update-snapshots
      - name: Commit + push the regenerated *-linux.png baselines
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage ONLY new/changed linux snapshot PNGs — never anything else the run may have touched.
          mapfile -t pngs < <(git ls-files --others --modified --exclude-standard -- '*-linux.png')
          if [ ${#pngs[@]} -eq 0 ]; then
            echo "No *-linux.png baseline changes to commit (already current)."
            exit 0
          fi
          printf 'Committing baseline(s):\n%s\n' "${pngs[@]}"
          git add -- "${pngs[@]}"
          # [skip ci] so the baseline commit doesn't re-trigger the workflow (no loop).
          git commit -m "ci(e2e): regenerate design-system visual baselines (linux) [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
