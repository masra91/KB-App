# SPEC-0042 EVAL — capability: recall (EVAL-10). Enrich a note, then ask a question whose answer the KB
# contains: recall must answer correctly, ground the answer in ≥1 cited claim, and cite it (ASK-7). The
# judge scores the qualitative correctness the deterministic checks can't.
id: recall-grounded
capability: recall
seed:
  kind: empty
actions:
  - ingest:
      text: "Python is a programming language created by Guido van Rossum and first released in 1991."
  - awaitDrain:
      stages: [decompose, connect, claims]
  - ask:
      query: "Who created Python?"
expect:
  deterministic:
    - check: recallCites
      args: { min: 1 }
    - check: recallContains
      args: { text: "Guido" }
  judge:
    - rubric: "Is the answer to 'Who created Python?' correct (Guido van Rossum), grounded in the KB, and cited? Score 1.0 only if correct + grounded + cited."
      runs: 3
      threshold: 0.8
