# SPEC-0042 EVAL — capability: connect (EVAL-10). Two notes about the same people/place → Decompose +
# Connect resolve them into shared entities and render a relatesTo hint as a real [[wikilink]] (CONNECT-12).
id: connect-wikilink
capability: connect
seed:
  kind: empty
actions:
  - ingest:
      text: "Marie Curie conducted her research at the University of Paris."
  - ingest:
      text: "Marie Curie won the Nobel Prize in Physics. She worked at the University of Paris."
  - awaitDrain:
      stages: [decompose, connect, claims]
expect:
  deterministic:
    - check: entitiesInclude
      args: ["Marie Curie", "University of Paris"]
    # The relatesTo hint (Curie worked at the university) became a real [[wikilink]] (CONNECT-12).
    - check: wikilinkRendered
      args: { from: "Marie Curie", to: "University of Paris" }
    # SPEC-0049 toss-rate (converge, never toss): good sources converge through decompose+connect+claims — 0% toss.
    - check: setAsideRate
      args: { max: 0 }
    # SPEC-0051 COHERE-3 — surface the graph-cohesion metric on the resolved vault (always-on readout; the
    # orphan linker now feeds it). No hard floor here (a 2-node single-edge graph is trivially Q=0); the
    # metric's discrimination is gated at the unit level (cohesion.test / entityAffinity.test). This keeps
    # the Principal's islands/orphans/hairball numbers visible on every connect eval run.
    - check: graphCohesion
      args: {}
