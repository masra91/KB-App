# SPEC-0042 EVAL ‚Äî capability: ingest (EVAL-10). Capture a primary note ‚Üí archive it to sources/ and let
# Decompose run, proving the capture‚Üísource‚Üípipeline entry path. The source must materialize + the named
# person becomes an entity.
id: ingest-primary
capability: ingest
seed:
  kind: empty
actions:
  - ingest:
      text: "Ada Lovelace wrote the first algorithm intended for the Analytical Engine."
  - awaitDrain:
      stages: [decompose]
expect:
  deterministic:
    # The captured note was archived as a primary source (ingest's job).
    - check: countBounds
      args: { dir: sources, min: 1 }
    # ‚Ä¶and entered the pipeline: the genuine entity is a node (DECOMP-17).
    - check: entitiesInclude
      args: ["Ada Lovelace"]
    # SPEC-0049 toss-rate (converge, never toss): a good source must NEVER be set aside ‚Äî 0% toss.
    - check: setAsideRate
      args: { max: 0 }
